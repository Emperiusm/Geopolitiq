# docker-compose.yml — profiles: dev, staging, prod

services:
  # ═══════════════════════════════════════════════════
  # BASE SERVICES (always run)
  # ═══════════════════════════════════════════════════

  mongo:
    container_name: gambit-mongo
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]      # Remove or bind to 127.0.0.1 in prod
    volumes:
      - mongo-data:/data/db
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: gambit-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6380:6379"]        # Remove or bind to 127.0.0.1 in prod
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ═══════════════════════════════════════════════════
  # DEV PROFILE — tools for local development
  # ═══════════════════════════════════════════════════

  api-dev:
    container_name: gambit-api-dev
    build: ./api
    ports: ["3000:3000"]
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/gambit
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      NODE_ENV: development
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      RATE_LIMIT_RPM: "1000"
      NEWS_POLL_FAST_MS: "1800000"
      NEWS_POLL_STANDARD_MS: "3600000"
      NEWS_POLL_SLOW_MS: "14400000"
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./api/src:/app/src
      - ./.firecrawl:/app/.firecrawl:ro
    profiles: ["dev"]

  mongo-express:
    container_name: gambit-mongo-express
    image: mongo-express:latest
    ports: ["8081:8081"]
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
    depends_on:
      mongo: { condition: service_healthy }
    profiles: ["dev"]

  mailpit:
    container_name: gambit-mailpit
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    profiles: ["dev"]

  # ═══════════════════════════════════════════════════
  # STAGING PROFILE — local production simulation
  # ═══════════════════════════════════════════════════

  api-staging:
    container_name: gambit-api-staging
    build:
      context: ./api
      dockerfile: Dockerfile.production
    ports: ["3000:3000"]
    environment:
      MONGO_URI: mongodb://mongo:27017/gambit
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      NODE_ENV: production
      CORS_ORIGINS: https://localhost
      FRONTEND_URL: https://localhost
      JWT_SECRET: ${JWT_SECRET:-staging-secret-change-for-production}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    profiles: ["staging"]

  nginx-staging:
    container_name: gambit-nginx-staging
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/staging.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/security-headers.conf:/etc/nginx/security_headers.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on: [api-staging]
    profiles: ["staging"]

  # ═══════════════════════════════════════════════════
  # PROD PROFILE — actual production (on VPS)
  # ═══════════════════════════════════════════════════

  api-prod:
    container_name: gambit-api
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/gambit}/api:latest
    restart: unless-stopped
    ports: ["3000:3000"]
    env_file: .env.production
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    profiles: ["prod"]

  nginx-prod:
    container_name: gambit-nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/production.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/security-headers.conf:/etc/nginx/security_headers.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on: [api-prod]
    profiles: ["prod"]

  certbot:
    container_name: gambit-certbot
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles: ["prod"]

  # ═══════════════════════════════════════════════════
  # INTELLIGENCE LAYER — Neo4j, Ollama, BullMQ
  # ═══════════════════════════════════════════════════

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/gambit-dev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "gambit-dev", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - engine
      - all

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
      OLLAMA_NUM_GPU: "99"

  bullmq-dashboard:
    image: taskforcesh/bullmq-dashboard
    ports:
      - "3001:3001"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    profiles:
      - dev

  # ═══════════════════════════════════════════════════
  # ENGINE INFRASTRUCTURE — Postgres, PgBouncer, Redis-persistent
  # ═══════════════════════════════════════════════════

  postgres:
    build: ./docker/postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gambit
      POSTGRES_PASSWORD: gambit
      POSTGRES_DB: gambit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gambit"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgcat:
    image: ghcr.io/postgresml/pgcat:latest
    ports:
      - "6432:6432"
    volumes:
      - ./docker/pgcat/pgcat.toml:/etc/pgcat/pgcat.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - engine
      - all

  redis-persistent:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy noeviction
    volumes:
      - redis_persistent_data:/data

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    profiles:
      - dev
      - engine
      - all

  # ═══════════════════════════════════════════════════
  # ENGINE PROFILE — ClickHouse, Typesense, Temporal, MinIO
  # ═══════════════════════════════════════════════════

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9100:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.d/gambit.xml
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - engine
      - all

  typesense:
    image: typesense/typesense:27.1
    ports:
      - "8108:8108"
    environment:
      TYPESENSE_API_KEY: gambit-dev
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8108/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - engine
      - all

  postgres-temporal:
    image: postgres:17
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - pg_temporal_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - engine
      - all

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - POSTGRES_SEEDS=postgres-temporal
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
    depends_on:
      postgres-temporal:
        condition: service_healthy
    profiles:
      - engine
      - all

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    profiles:
      - engine
      - all

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gambit
      MINIO_ROOT_PASSWORD: gambit-dev
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - engine
      - all

  minio-init:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set gambit http://minio:9000 gambit gambit-dev;
      mc mb --ignore-existing gambit/documents;
      mc mb --ignore-existing gambit/exports;
      mc mb --ignore-existing gambit/foia-responses;
      mc mb --ignore-existing gambit/raw-payloads;
      mc mb --ignore-existing gambit/token-embeddings;
      "
    depends_on:
      - minio
    profiles:
      - engine
      - all

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    profiles:
      - engine
      - all

  # ═══════════════════════════════════════════════════
  # OBSERVABILITY PROFILE — OTel Collector, Tempo, Grafana
  # ═══════════════════════════════════════════════════

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
      - "4318:4318"
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./docker/otel/config.yaml:/etc/otel/config.yaml
    depends_on:
      - tempo
    profiles:
      - observability
      - all

  tempo:
    image: grafana/tempo:latest
    ports:
      - "3200:3200"
    profiles:
      - observability
      - all

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
    profiles:
      - observability
      - all

  # ═══════════════════════════════════════════════════
  # TEST PROFILE — isolated test databases
  # ═══════════════════════════════════════════════════

  postgres-test:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: gambit_test
      POSTGRES_PASSWORD: gambit_test
      POSTGRES_DB: gambit_test
    tmpfs: /var/lib/postgresql/data
    profiles:
      - test

volumes:
  mongo-data:
  neo4j-data:
  ollama-models:
  pgdata:
  pg_temporal_data:
  clickhouse_data:
  typesense_data:
  minio_data:
  redis_persistent_data:
  caddy_data:
  grafana_data:
  nats_data:
